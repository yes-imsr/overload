name: Codex Review Automerge

on:
  pull_request_review:
    types: [submitted]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  handle-codex-review:
    name: Handle Codex review
    runs-on: ubuntu-latest
    if: github.event.pull_request.state == 'open'

    steps:
      - name: Respond to Codex review
        uses: actions/github-script@v7
        env:
          CODEX_REVIEW_LOGIN_PATTERN: ${{ vars.CODEX_REVIEW_LOGIN_PATTERN || 'codex' }}
          CURSOR_HANDOFF_COMMENT: "@cursoragent take a look at this to see if its worth fixing, if fixed, add that commit and ping codex again for code review."
        with:
          script: |
            const { owner, repo } = context.repo;
            const review = context.payload.review;
            const pull = context.payload.pull_request;
            const reviewer = review.user?.login ?? "";
            const codexPattern = new RegExp(process.env.CODEX_REVIEW_LOGIN_PATTERN, "i");

            if (!codexPattern.test(reviewer)) {
              core.info(`Ignoring review from ${reviewer}; it does not match CODEX_REVIEW_LOGIN_PATTERN.`);
              return;
            }

            const pull_number = pull.number;
            core.info(`Handling Codex review ${review.id} on PR #${pull_number}; state=${review.state}.`);

            if (review.state === "approved") {
              try {
                await github.graphql(
                  `mutation EnablePullRequestAutoMerge($pullRequestId: ID!, $mergeMethod: PullRequestMergeMethod!) {
                    enablePullRequestAutoMerge(input: { pullRequestId: $pullRequestId, mergeMethod: $mergeMethod }) {
                      pullRequest {
                        number
                        autoMergeRequest {
                          enabledAt
                        }
                      }
                    }
                  }`,
                  {
                    pullRequestId: pull.node_id,
                    mergeMethod: "SQUASH",
                  },
                );
                core.info(`Enabled squash auto-merge for PR #${pull_number}.`);
              } catch (error) {
                core.warning(`Could not enable auto-merge: ${error.message}`);

                const { data: currentPull } = await github.rest.pulls.get({
                  owner,
                  repo,
                  pull_number,
                });

                if (currentPull.mergeable && currentPull.mergeable_state === "clean") {
                  await github.rest.pulls.merge({
                    owner,
                    repo,
                    pull_number,
                    merge_method: "squash",
                    commit_title: currentPull.title,
                  });
                  core.info(`Squash-merged PR #${pull_number} after Codex approval.`);
                } else {
                  await github.rest.issues.createComment({
                    owner,
                    repo,
                    issue_number: pull_number,
                    body: `Codex approved this PR, but auto-merge could not be enabled and the PR was not clean for immediate merge.\n\nAuto-merge error: \`${error.message}\`\nCurrent mergeable state: \`${currentPull.mergeable_state}\``,
                  });
                }
              }
              return;
            }

            const handoff = process.env.CURSOR_HANDOFF_COMMENT;
            const comments = await github.paginate(github.rest.pulls.listReviewComments, {
              owner,
              repo,
              pull_number,
              per_page: 100,
            });

            const codexComments = comments.filter((comment) => {
              const fromCodex = codexPattern.test(comment.user?.login ?? "");
              const fromThisReview = comment.pull_request_review_id === review.id;
              const isTopLevel = !comment.in_reply_to_id;
              return fromCodex && fromThisReview && isTopLevel;
            });

            if (codexComments.length === 0) {
              core.info("No top-level inline Codex review comments found for this review.");
              return;
            }

            for (const comment of codexComments) {
              await github.rest.pulls.createReplyForReviewComment({
                owner,
                repo,
                pull_number,
                comment_id: comment.id,
                body: handoff,
              });
              core.info(`Replied to Codex review comment ${comment.id}.`);
            }
