name: Linear QA Handoff

on:
  issue_comment:
    types: [created]
  pull_request_review:
    types: [submitted]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  qa-handoff:
    runs-on: ubuntu-latest

    steps:
      - name: Determine QA verdict
        id: verdict
        uses: actions/github-script@v7
        with:
          script: |
            let body = "";

            if (context.eventName === "issue_comment") {
              body = context.payload.comment.body || "";
            }

            if (context.eventName === "pull_request_review") {
              body = context.payload.review.body || "";
            }

            const pass = body.includes("Verdict: Pass");
            const fail = body.includes("Verdict: Fail");

            core.setOutput("pass", pass ? "true" : "false");
            core.setOutput("fail", fail ? "true" : "false");

      - name: Stop if not a Codex verdict
        if: steps.verdict.outputs.pass != 'true' && steps.verdict.outputs.fail != 'true'
        run: echo "No Codex verdict found. Skipping."

      - name: Get PR details
        if: steps.verdict.outputs.pass == 'true' || steps.verdict.outputs.fail == 'true'
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            let prNumber = null;

            if (context.payload.issue && context.payload.issue.pull_request) {
              prNumber = context.payload.issue.number;
            }

            if (context.payload.pull_request) {
              prNumber = context.payload.pull_request.number;
            }

            if (!prNumber) {
              core.setFailed("No pull request found.");
              return;
            }

            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });

            const combined = `${pr.title}\n${pr.body || ""}\n${pr.head.ref}`;
            const match = combined.match(/OVR-\d+/i);

            if (!match) {
              core.setFailed("No Linear issue ID like OVR-7 found in PR title/body/branch.");
              return;
            }

            core.setOutput("number", prNumber);
            core.setOutput("linear_issue", match[0].toUpperCase());
            core.setOutput("html_url", pr.html_url);

      - name: Update Linear issue to QA Passed and assign Cursor
        if: steps.verdict.outputs.pass == 'true'
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
          LINEAR_CURSOR_USER_ID: ${{ secrets.LINEAR_CURSOR_USER_ID }}
          LINEAR_QA_PASSED_STATE_ID: ${{ secrets.LINEAR_QA_PASSED_STATE_ID }}
          LINEAR_ISSUE_ID: ${{ steps.pr.outputs.linear_issue }}
          PR_URL: ${{ steps.pr.outputs.html_url }}
        run: |
          curl -sS https://api.linear.app/graphql \
            -H "Authorization: $LINEAR_API_KEY" \
            -H "Content-Type: application/json" \
            --data "$(jq -n \
              --arg issue "$LINEAR_ISSUE_ID" \
              --arg state "$LINEAR_QA_PASSED_STATE_ID" \
              --arg assignee "$LINEAR_CURSOR_USER_ID" \
              --arg pr "$PR_URL" \
              '{
                query: "mutation UpdateIssue($id: String!, $input: IssueUpdateInput!) { issueUpdate(id: $id, input: $input) { success issue { id identifier title } } }",
                variables: {
                  id: $issue,
                  input: {
                    stateId: $state,
                    assigneeId: $assignee
                  }
                }
              }')"

      - name: Comment Cursor merge request
        if: steps.verdict.outputs.pass == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const issueId = "${{ steps.pr.outputs.linear_issue }}";

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number("${{ steps.pr.outputs.number }}"),
              body: `@cursor Codex returned **Verdict: Pass** for ${issueId}.

Linear has been moved to **QA Passed** and reassigned to Cursor.

Please merge this PR if branch protection/checks are satisfied, then move ${issueId} to **Done**.`
            });

      - name: Update Linear issue to QA Failed on fail
        if: steps.verdict.outputs.fail == 'true'
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
          LINEAR_CURSOR_USER_ID: ${{ secrets.LINEAR_CURSOR_USER_ID }}
          LINEAR_QA_FAILED_STATE_ID: ${{ secrets.LINEAR_QA_FAILED_STATE_ID }}
          LINEAR_ISSUE_ID: ${{ steps.pr.outputs.linear_issue }}
        run: |
          curl -sS https://api.linear.app/graphql \
            -H "Authorization: $LINEAR_API_KEY" \
            -H "Content-Type: application/json" \
            --data "$(jq -n \
              --arg issue "$LINEAR_ISSUE_ID" \
              --arg state "$LINEAR_QA_FAILED_STATE_ID" \
              --arg assignee "$LINEAR_CURSOR_USER_ID" \
              '{
                query: "mutation UpdateIssue($id: String!, $input: IssueUpdateInput!) { issueUpdate(id: $id, input: $input) { success issue { id identifier title } } }",
                variables: {
                  id: $issue,
                  input: {
                    stateId: $state,
                    assigneeId: $assignee
                  }
                }
              }')"

      - name: Comment Cursor fix request
        if: steps.verdict.outputs.fail == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const issueId = "${{ steps.pr.outputs.linear_issue }}";

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number("${{ steps.pr.outputs.number }}"),
              body: `@cursor Codex returned **Verdict: Fail** for ${issueId}.

Linear has been moved to **QA Failed** and reassigned to Cursor.

Please fix only the QA findings, push to this same PR, and move the issue back to **Ready for QA** when done.`
            });
