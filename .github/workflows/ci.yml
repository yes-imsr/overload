name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  typecheck-and-test:
    name: Typecheck and test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test

      - name: Expo web export smoke (mobile)
        run: pnpm --filter @overload/mobile exec expo export --platform web --output-dir dist-qa-web
