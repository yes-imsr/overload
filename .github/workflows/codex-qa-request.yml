name: Request Codex QA

on:
  pull_request:
    types: [opened, ready_for_review, synchronize]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  request-codex-qa:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest

    steps:
      - name: Check if Codex was already requested
        id: existing
        uses: actions/github-script@v7
        with:
          script: |
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
            });

            const alreadyRequested = comments.data.some(comment =>
              comment.body.includes('@codex') &&
              comment.body.includes('Review this PR')
            );

            core.setOutput('already_requested', alreadyRequested ? 'true' : 'false');

      - name: Request Codex QA
        if: steps.existing.outputs.already_requested != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const body = pr.body || '';
            const title = pr.title || '';
            const branch = pr.head.ref || '';

            const match =
              title.match(/OVR-\d+/i) ||
              body.match(/OVR-\d+/i) ||
              branch.match(/ovr-\d+/i);

            const issueId = match ? match[0].toUpperCase() : 'linked Linear issue';

            const comment = `@codex Review this PR for ${issueId}.

You are QA only.

Use the linked Linear issue as the source of truth.

Verify:
- Linear acceptance criteria are satisfied.
- Architecture notes are followed.
- QA notes are covered.
- Relevant commands were run.
- Typecheck passes.
- Tests pass.
- Lint passes if configured.
- No production feature logic was added early.
- No deferred scope was added.
- No workout/game business math lives in mobile UI unless the issue explicitly allows it.

Return:
- Verdict: Pass / Fail
- Summary
- Linear issue reviewed
- Acceptance criteria checklist
- Commands run
- Test results
- Bugs / gaps found
- Required fixes
- Regression notes
- Merge recommendation

If this fails, do not fix it yourself unless explicitly asked. Leave precise QA comments for Cursor.`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              body: comment,
            });
