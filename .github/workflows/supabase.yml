name: Supabase

on:
  push:
    branches: [main]
    paths:
      - "supabase/**"
      - "packages/core-engine/**"
  pull_request:
    paths:
      - "supabase/**"
      - "packages/core-engine/**"

jobs:
  db-migrations-and-pgtap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Reset local database and run pgTAP
        run: |
          supabase db start
          supabase db reset --local
          supabase test db
