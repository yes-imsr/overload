name: Supabase

on:
  push:
    branches: [main]
    paths:
      - "supabase/**"
      - "packages/core-engine/**"
  pull_request:
    paths:
      - "supabase/**"
      - "packages/core-engine/**"

jobs:
  db-migrations-and-pgtap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Bundle core-engine for Edge Functions
        run: pnpm bundle:edge-core-engine

      - name: Reset local database and run pgTAP
        run: |
          supabase db start
          supabase db reset --local
          supabase test db
