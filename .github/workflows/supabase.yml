name: Supabase

on:
  pull_request:
    paths:
      - "supabase/**"
      - ".github/workflows/supabase.yml"
  push:
    branches: [main]
    paths:
      - "supabase/**"
      - ".github/workflows/supabase.yml"

jobs:
  migrations-and-pgtap:
    name: Migrations and pgTAP
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start Supabase
        run: supabase start

      - name: Reset database (migrations + seed)
        run: supabase db reset --local

      - name: Run pgTAP tests
        run: supabase test db --local
